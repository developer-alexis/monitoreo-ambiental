<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/footer.css">
  <title>Monitoreo ambiental</title>
</head>

<body>
  <header>
    <div class="page-logo">
      <img src="images/planet-earth.png" alt="logo">
      <p>Monitoreo ambiental</p>
    </div>
    <button>
      Vincular dispositivo
    </button>
  </header>

  <main>
    <div class="readings">
      <div id="temperature">
        <p>Temperatura</p>
        <img src="images/thermometer.png" alt="Temperature">
        <p>50º C</p>
      </div>
      <div id="humidity">
        <p>Humedad</p>
        <img src="images/humidity.png" alt="Humidity">
        <p>60%</p>
      </div>
      <div id="air-quality">
        <p>Calidad de aire</p>
        <img src="images/wind.png" alt="Air quality">
        <p>22.5 µg/m³</p>
      </div>
    </div>

    <div class="environment-report">
      <h2>Estado del entorno</p>
        <h1 id="environment-status-text">Óptimo</h1>
        <hr>
        <p>Rangos de referencia (salud):</p>
        <div>
          <p>Temperatura</p>
          <div class="dots"></div>
          <p style="font-weight: 600;">18ºC - 27ºC</p>
        </div>
        <div>
          <p>Humedad</p>
          <div class="dots"></div>
          <p style="font-weight: 600;">30% - 60%</p>
        </div>
        <div>
          <p>Partículas PM2.5</p>
          <div class="dots"></div>
          <p style="font-weight: 600;">&lt; 12 µg/m³</p>
        </div>
    </div>
  </main>

  <footer>
    <p>&copy; Alexis Fuentes 2026</p>
  </footer>
</body>

</html>
