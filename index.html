<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/footer.css">
  <title>Monitoreo ambiental</title>
</head>

<body>
  <header>
    <div class="page-logo">
      <img src="images/planet-earth.png" alt="logo">
      <p>Monitoreo ambiental</p>
    </div>
    <button>
      Vincular dispositivo
    </button>
  </header>

  <main>
    <div class="readings">
      <div id="temperature">
        <p>Temperatura</p>
        <img src="images/thermometer.png" alt="Temperature">
        <p>50º C</p>
      </div>
      <div id="humidity">
        <p>Humedad</p>
        <img src="images/humidity.png" alt="Humidity">
        <p>60%</p>
      </div>
      <div id="air-quality">
        <p>Calidad de aire</p>
        <img src="images/wind.png" alt="Air quality">
        <p>22.5 µg/m³</p>
      </div>
    </div>
  </main>

  <footer>
    <p style="font-size: var(--fontSizeExtraSmall);">&copy; Alexis Fuentes 2026</p>
  </footer>
</body>

</html>
